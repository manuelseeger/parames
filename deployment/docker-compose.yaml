name: parames

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    command: uv run uvicorn parames.api:app --host 0.0.0.0 --port 8000
    environment:
      PARAMES_CONFIG_PATH: /app/config/default.yaml
      PARAMES_MONGO_URI: mongodb://mongo:27017/parames
      PARAMES_TELEGRAM_BOT_TOKEN: ${PARAMES_TELEGRAM_BOT_TOKEN}
      PYTHONUNBUFFERED: "1"
    ports:
      - "8090:8000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - parames_network
    restart: unless-stopped

  scheduler:
    build:
      context: ..
      dockerfile: Dockerfile
    command: uv run python -m parames.scheduler
    environment:
      PARAMES_CONFIG_PATH: /app/config/default.yaml
      PARAMES_TELEGRAM_BOT_TOKEN: ${PARAMES_TELEGRAM_BOT_TOKEN}
      PARAMES_MONGO_URI: mongodb://mongo:27017/parames
      PYTHONUNBUFFERED: "1"
    # Override config mount for custom config (optional)
    # volumes:
    #   - /path/to/prod/config:/app/config:ro
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - parames_network
    restart: unless-stopped

  mongo:
    image: mongo:8
    environment:
      MONGO_INITDB_DATABASE: parames
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - parames_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

networks:
  parames_network:
    name: parames_network

volumes:
  mongo_data:
